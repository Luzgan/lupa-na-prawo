server {
    listen 443 ssl;
    server_name lupa-na-prawo.lukholc.me;

    ssl_certificate /etc/letsencrypt/live/lupa-na-prawo.lukholc.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lupa-na-prawo.lukholc.me/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8766;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE/streaming support for MCP
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
